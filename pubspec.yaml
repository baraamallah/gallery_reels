name: gallery_reels
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  photo_manager: ^3.0.0
  flutter_riverpod: ^3.1.0
  sqflite: ^2.3.3
  path: ^1.9.0
  share_plus: ^12.0.2
  flutter_animate: ^4.5.1
  phosphor_flutter: ^2.1.0
  confetti: ^0.8.0
  flutter_secure_storage: ^10.0.0
  app_settings: ^7.0.0
  google_fonts: ^8.0.2
  flutter_staggered_grid_view: ^0.7.0
  riverpod_annotation: ^4.0.0
  path_provider: ^2.1.2
  photo_manager_image_provider: ^2.2.0
  cross_file: ^0.3.5+2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.4.9
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
